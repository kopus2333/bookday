<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 책의 날 4.23, 출판인 PICK 인생책</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-red: #D62246;
            --soft-rose: #FFF0F2;
            --deep-rose: #8B0021;
            --bg-paper: #FFFAFB;
            --text-main: #2D1B1E;
            --border-color: #F7D1D7;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-paper);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        h1, .book-info h2 {
            font-family: 'Nanum Myeongjo', serif;
        }

        header {
            background: linear-gradient(135deg, var(--deep-rose) 0%, #C71534 100%);
            color: #FFF0F2;
            text-align: center;
            padding: 6rem 1rem 8rem 1rem;
            margin-bottom: 3rem;
            box-shadow: 0 10px 25px rgba(139, 0, 33, 0.15);
            border-radius: 0 0 60% 40% / 0 0 45px 35px;
        }

        header h1 {
            margin: 0 0 1.2rem 0;
            font-size: 3.2rem;
            color: #FFFFFF;
            letter-spacing: -1px;
            font-weight: 800;
        }

        header p {
            margin: 0;
            font-size: 1.3rem;
            font-family: 'Gowun Batang', serif;
            color: #FFD8DF;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem 1.5rem;
        }

        .summary-wrapper {
            text-align: center;
            margin-bottom: 2rem;
        }

        .count-summary {
            background-color: white;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.1rem;
            color: var(--deep-rose);
            box-shadow: 0 4px 15px rgba(139, 0, 33, 0.1);
            border: 1px solid var(--border-color);
            font-weight: 700;
        }

        .search-wrapper {
            max-width: 600px;
            margin: 0 auto 3.5rem auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            padding-right: 4rem;
            border-radius: 40px;
            border: 2px solid var(--border-color);
            background-color: white;
            font-size: 1.1rem;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-main);
            box-shadow: 0 10px 20px rgba(139, 0, 33, 0.05);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--rose-red);
            box-shadow: 0 10px 25px rgba(214, 34, 70, 0.15);
        }

        .search-icon {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
            color: var(--rose-red);
            cursor: pointer;
        }

        .stats-wrapper {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3.5rem;
            flex-wrap: wrap;
        }

        .stat-card {
            padding: 1.2rem 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(139, 0, 33, 0.08);
            min-width: 120px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .stat-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-family: 'Gowun Batang', serif;
        }

        .stat-card .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .stat-card.publishers { background-color: var(--soft-rose); color: var(--deep-rose); }
        .stat-card.books { background-color: #FFFFFF; color: var(--rose-red); }
        .stat-card.people { background-color: var(--deep-rose); color: #FFFFFF; border-color: var(--deep-rose); }

        .book-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 2.5rem;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .book-card {
            background-color: #FFFFFF;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(139, 0, 33, 0.04);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(139, 0, 33, 0.12);
            border-color: var(--rose-red);
        }

        /* 추천인 정보 영역 */
        .recommender-top {
            padding: 1.5rem 1.8rem 1.2rem 1.8rem;
            text-align: center;
            background-color: #FFFFFF;
        }

        .recommender-name {
            display: block;
            font-size: 1.2rem;
            color: var(--deep-rose);
            font-weight: 700;
            font-family: 'Gowun Batang', serif;
        }

        .recommender-role {
            display: block;
            font-size: 0.95rem;
            color: #666;
            margin-top: 0.4rem;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 카드 내부 탭 영역 */
        .card-tabs {
            display: flex;
            border-top: 1px dashed var(--border-color);
            border-bottom: 1px solid var(--border-color);
            background-color: #FAFAFA;
        }

        .card-tab {
            flex: 1;
            padding: 0.9rem;
            text-align: center;
            border: none;
            background: none;
            font-family: 'Gowun Batang', serif;
            font-weight: 700;
            font-size: 1.05rem;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }

        .card-tab.active {
            color: var(--deep-rose);
            border-bottom: 3px solid var(--deep-rose);
            background-color: #FFFFFF;
        }

        .card-tab:hover:not(.active) {
            color: var(--rose-red);
            background-color: #FFF0F2;
        }

        /* 책 내용 섹션 (클릭 시 이동할 수 있도록 감싸는 용도) */
        .book-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .card-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .cover-area {
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, var(--soft-rose), #FFFFFF);
            padding: 1.5rem 0 1rem 0;
            position: relative;
        }

        .cover-area img {
            height: 90%;
            width: auto;
            object-fit: contain;
            box-shadow: 5px 12px 24px rgba(0,0,0,0.15);
            border-radius: 4px;
            transition: transform 0.4s ease;
        }

        .book-card:hover .cover-area img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 1rem 1.8rem 2rem 1.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .book-info {
            margin-bottom: 1.2rem;
            text-align: center;
        }

        .book-info h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #111;
            line-height: 1.3;
            word-break: keep-all;
            font-weight: 800;
        }

        .book-metadata {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: #888;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 400;
        }

        .reason-box {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .quote-text {
            margin: 0;
            line-height: 1.8;
            color: #555;
            font-size: 1.05rem;
            text-align: justify;
            text-justify: inter-character;
            word-break: keep-all;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 400;
            position: relative;
        }

        .no-book {
            padding: 4rem 2rem;
            text-align: center;
            color: #999;
            font-family: 'Gowun Batang', serif;
            font-size: 1.1rem;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loader {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--deep-rose);
            font-family: 'Gowun Batang', serif;
        }

        .pagination {
            text-align: center;
            margin-top: 4.5rem;
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .pagination-button {
            background-color: white;
            color: var(--deep-rose);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .pagination-button.active {
            background-color: var(--deep-rose);
            color: white;
            border-color: var(--deep-rose);
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4rem;
            font-size: 1.2rem;
            color: #8E8E8E;
            font-family: 'Gowun Batang', serif;
        }

        footer {
            margin-top: 5rem;
            padding: 3rem 1rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: #999;
        }

        footer a {
            color: var(--deep-rose);
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            header {
                padding: 4rem 1rem 6rem 1rem;
                border-radius: 0 0 50% 50% / 0 0 25px 25px;
            }
            header h1 { font-size: 2.2rem; }
            .book-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🌹 세계 책의 날 4.23, 출판인 PICK 인생책 📕</h1>
        <p>이 책 안 본 사람 없게 해주세요 🙏 <br> 한국출판인회의가 함께하는 ‘세계 책의 날’, 출판인의 인생책 큐레이션✨</p>
    </header>

        <div class="search-wrapper">
            <input type="text" id="search-input" class="search-input" placeholder="추천인, 책 제목, 저자, 출판사를 검색해 보세요.">
            <span class="search-icon">🔍</span>
        </div>
        
        <div class="stats-wrapper" id="stats-wrapper" style="display: none;">
            <div class="stat-card publishers">
                <div class="stat-title">참여 출판사</div>
                <div class="stat-number" id="stat-publishers">-</div>
            </div>
            <div class="stat-card books">
                <div class="stat-title">추천받은 책</div>
                <div class="stat-number" id="stat-books">-</div>
            </div>
            <div class="stat-card people">
                <div class="stat-title">참여 출판인</div>
                <div class="stat-number" id="stat-people">-</div>
            </div>
        </div>
        
        <div id="loader">🌸 로딩중... 📖</div>
        
        <div class="book-grid" id="book-grid"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <footer>
        <p>© 2026 Korea Publishers Society. All rights reserved.</p>
        <p>본 페이지의 소스 코드는 <a href="https://github.com/kopus2333/bookday" target="_blank">GitHub Repository</a> 에서 확인하실 수 있습니다.</p>
    </footer>

    <script>
        function parseCSV(text) {
            const result = [];
            let row = [];
            let field = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (inQuotes) {
                    if (char === '"' && nextChar === '"') {
                        field += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = false;
                    } else {
                        field += char;
                    }
                } else {
                    if (char === '"') {
                        inQuotes = true;
                    } else if (char === ',') {
                        row.push(field.trim());
                        field = '';
                    } else if (char === '\n' || char === '\r') {
                        if (field || row.length > 0) {
                            row.push(field.trim());
                            result.push(row);
                            field = '';
                            row = [];
                        }
                        if (char === '\r' && nextChar === '\n') i++;
                    } else {
                        field += char;
                    }
                }
            }
            if (field || row.length > 0) {
                row.push(field.trim());
                result.push(row);
            }
            return result;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        let allPeople = []; 
        let filteredPeople = []; 
        let currentPage = 1;
        const itemsPerPage = 12;

        // 카드 안의 탭을 전환하는 기능
        window.switchCardTab = function(event, type) {
            event.preventDefault();
            const btn = event.currentTarget;
            const card = btn.closest('.book-card');
            
            card.querySelectorAll('.card-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            card.querySelectorAll('.book-section').forEach(section => section.style.display = 'none');
            
            if (type === 'our') {
                card.querySelector('.our-book').style.display = 'flex';
            } else {
                card.querySelector('.good-book').style.display = 'flex';
            }
        };

        function displayBooks(page) {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';
            
            if (filteredPeople.length === 0) {
                grid.innerHTML = `<div class="no-results">🌸 찾는 결과가 없는 것 같아요. 다른 검색어를 입력해 보세요.</div>`;
                grid.style.display = 'grid';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const peopleToDisplay = filteredPeople.slice(startIndex, endIndex);

            peopleToDisplay.forEach(person => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'book-card';

                // 우리 책 영역 구성
                const ourBookHtml = person.ourBook ? `
                    <a href="${person.ourBook.url || '#'}" target="_blank" class="card-link">
                        <div class="cover-area">
                            <img src="${person.ourBook.cover}" onerror="this.src='https://via.placeholder.com/150x220?text=No+Cover'">
                        </div>
                        <div class="card-content">
                            <div class="book-info">
                                <h2>${person.ourBook.title}</h2>
                                <div class="book-metadata">${person.ourBook.author} | ${person.ourBook.publisher}</div>
                            </div>
                            <div class="reason-box">
                                <p class="quote-text">💬 "${person.ourBook.reason}"</p>
                            </div>
                        </div>
                    </a>
                ` : '<div class="no-book">이 항목에 등록된 책이 없습니다.</div>';

                // 좋은 책 영역 구성
                const goodBookHtml = person.goodBook ? `
                    <a href="${person.goodBook.url || '#'}" target="_blank" class="card-link">
                        <div class="cover-area">
                            <img src="${person.goodBook.cover}" onerror="this.src='https://via.placeholder.com/150x220?text=No+Cover'">
                        </div>
                        <div class="card-content">
                            <div class="book-info">
                                <h2>${person.goodBook.title}</h2>
                                <div class="book-metadata">${person.goodBook.author} | ${person.goodBook.publisher}</div>
                            </div>
                            <div class="reason-box">
                                <p class="quote-text">💬 "${person.goodBook.reason}"</p>
                            </div>
                        </div>
                    </a>
                ` : '<div class="no-book">이 항목에 등록된 책이 없습니다.</div>';

                // 우선적으로 보여줄 탭을 결정 (우리 책이 있으면 우리 책을, 없으면 좋은 책을 켬)
                const showOur = !!person.ourBook;
                
                cardDiv.innerHTML = `
                    <div class="recommender-top">
                        <span class="recommender-name">👤 ${person.name} 님 ✨</span>
                        <span class="recommender-role">(${person.company} ${person.role})</span>
                    </div>
                    <div class="card-tabs">
                        <button class="card-tab ${showOur ? 'active' : ''}" onclick="switchCardTab(event, 'our')">우리 책</button>
                        <button class="card-tab ${!showOur ? 'active' : ''}" onclick="switchCardTab(event, 'good')">좋은 책</button>
                    </div>
                    <div class="book-section our-book" style="display: ${showOur ? 'flex' : 'none'};">
                        ${ourBookHtml}
                    </div>
                    <div class="book-section good-book" style="display: ${!showOur ? 'flex' : 'none'};">
                        ${goodBookHtml}
                    </div>
                `;
                grid.appendChild(cardDiv);
            });

            grid.style.display = 'grid';
            document.getElementById('loader').style.display = 'none';
        }

        function setupPagination(totalItems) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            if (totalPages <= 1) return;

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `pagination-button ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => {
                    currentPage = i;
                    displayBooks(currentPage);
                    setupPagination(totalItems);
                    const containerTop = document.querySelector('.summary-wrapper').offsetTop;
                    window.scrollTo({ top: containerTop - 20, behavior: 'smooth' });
                };
                pagination.appendChild(btn);
            }
        }

        // 검색 처리
        function filterContent() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            
            filteredPeople = allPeople.filter(person => {
                if (query === "") return true;

                // 추천인 이름이나 소속으로 검색
                const matchPerson = person.name.toLowerCase().includes(query) || person.company.toLowerCase().includes(query);
                
                // 우리 책 정보로 검색
                const matchOur = person.ourBook && (
                    person.ourBook.title.toLowerCase().includes(query) || 
                    person.ourBook.author.toLowerCase().includes(query) || 
                    person.ourBook.publisher.toLowerCase().includes(query)
                );
                
                // 좋은 책 정보로 검색
                const matchGood = person.goodBook && (
                    person.goodBook.title.toLowerCase().includes(query) || 
                    person.goodBook.author.toLowerCase().includes(query) || 
                    person.goodBook.publisher.toLowerCase().includes(query)
                );
                
                return matchPerson || matchOur || matchGood;
            });
            
            currentPage = 1;
            displayBooks(currentPage);
            setupPagination(filteredPeople.length);
        }

        async function loadBooks() {
            try {
                const response = await fetch('423data.csv');
                let csvText = await response.text();
                csvText = csvText.replace(/^\uFEFF/, '');
                
                const data = parseCSV(csvText);
                const header = data[0].map(h => h.trim());
                const rows = data.slice(1);

                const getIdx = (name) => header.indexOf(name);
                const idx = {
                    category: getIdx('구분'),
                    company: getIdx('소속'),
                    role: getIdx('직책'),
                    name: getIdx('표기명'),
                    title: getIdx('추천도서명'),
                    author: getIdx('저자'),
                    publisher: getIdx('출판사'),
                    reason: getIdx('추천이유'),
                    url: getIdx('도서 url'),
                    cover: getIdx('표지 url')
                };

                const peopleMap = new Map();

                rows.forEach(row => {
                    const category = row[idx.category] || '';
                    const name = row[idx.name] || '';
                    const company = row[idx.company] || '';
                    const personKey = name + '|' + company;
                    
                    if (!name) return;

                    if (!peopleMap.has(personKey)) {
                        peopleMap.set(personKey, {
                            name: name,
                            company: company,
                            role: row[idx.role] || '',
                            ourBook: null,
                            goodBook: null
                        });
                    }
                    
                    const person = peopleMap.get(personKey);
                    const bookInfo = {
                        title: row[idx.title] || '',
                        author: row[idx.author] || '',
                        publisher: row[idx.publisher] || '',
                        reason: row[idx.reason] || '',
                        url: row[idx.url] || '',
                        cover: row[idx.cover] || ''
                    };
                    
                    if (category === '자사도서') {
                        person.ourBook = bookInfo;
                    } else if (category === '타사도서') {
                        person.goodBook = bookInfo;
                    }
                });
                
                allPeople = Array.from(peopleMap.values());
                shuffleArray(allPeople);


                // 상단 통계 수치 계산
                const uniquePublishers = new Set();
                const uniqueBooks = new Set();
                
                allPeople.forEach(person => {
                    if (person.company) uniquePublishers.add(person.company);
                    if (person.ourBook && person.ourBook.title) uniqueBooks.add(person.ourBook.title);
                    if (person.goodBook && person.goodBook.title) uniqueBooks.add(person.goodBook.title);
                });

                document.getElementById('stat-publishers').innerText = uniquePublishers.size;
                document.getElementById('stat-books').innerText = uniqueBooks.size;
                document.getElementById('stat-people').innerText = allPeople.length;
                document.getElementById('stats-wrapper').style.display = 'flex';

                filterContent();
                document.getElementById('search-input').addEventListener('input', filterContent);

            } catch (error) {
                document.getElementById('loader').innerHTML = `⚠️ 정보를 불러오지 못했습니다.`;
            }
        }

        window.onload = loadBooks;
    </script>
